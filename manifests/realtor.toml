[provider]
name = "realtor"
description = "Realtor.com — US real estate property data via RapidAPI"
base_url = "https://realty-in-us.p.rapidapi.com"
auth_type = "header"
auth_header_name = "x-rapidapi-key"
auth_key_name = "rapidapi_key"

[provider.extra_headers]
"x-rapidapi-host" = "realty-in-us.p.rapidapi.com"

[[tools]]
name = "property_search_realtor"
description = "Get detailed property information from Realtor.com including price, bedrooms, bathrooms, and lot details."
endpoint = "/properties/v3/detail"
method = "GET"
scope = "tool:property_search_realtor"

[tools.input_schema]
type = "object"
required = ["property_id"]

[tools.input_schema.properties.property_id]
type = "string"
description = "Realtor.com property ID"

[tools.response]
format = "json"
