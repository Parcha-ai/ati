# =============================================================================
# ATI Tool Manifest — Annotated Example
# =============================================================================
#
# This file shows all available fields for defining an ATI tool provider.
# Copy this file and modify it to add your own tools.
#
# File location: ~/.ati/manifests/<provider_name>.toml
# =============================================================================

# --- Provider Section (required, exactly one per file) ---
[provider]
# Unique provider name (used in ati tool list, ati provider list)
name = "example_provider"

# Human-readable description of what this provider offers
description = "An example provider showing all manifest features"

# Base URL for all tool endpoints. Tool endpoints are appended to this.
# Example: base_url + tool.endpoint = "https://api.example.com/v1/search"
base_url = "https://api.example.com/v1"

# Authentication type. Options:
#   "bearer" — Authorization: Bearer <key>  (most common)
#   "header" — Custom header: <header_name>: <key>  (default header: X-Api-Key)
#   "query"  — ?<param_name>=<key> appended to URL  (default param: api_key)
#   "basic"  — HTTP Basic auth with key as username
#   "none"   — No authentication (free APIs like PubMed)
auth_type = "bearer"

# Name of the key in keyring.enc that holds the API credential.
# Must match exactly what the orchestrator encrypts into the keyring.
# Only required if auth_type != "none"
auth_key_name = "example_api_key"

# Custom header name for auth_type = "header".
# Default: "X-Api-Key". Override for APIs that use different headers.
# Examples: "X-Finnhub-Token", "X-API-KEY", "Authorization"
# auth_header_name = "X-Api-Key"

# Custom query parameter name for auth_type = "query".
# Default: "api_key". Override for APIs that use different param names.
# Examples: "apiKey", "key", "token"
# auth_query_name = "api_key"

# If true, this provider is hidden from `ati tool list` output.
# Used for internal providers like the LLM for `ati help`.
# Default: false
internal = false

# Handler type. Currently only "http" is supported.
# Future: "wasm" for complex multi-step tools.
# Default: "http"
handler = "http"


# --- Tool Definitions (one or more [[tools]] sections per file) ---

[[tools]]
# Unique tool name — this is what users type in `ati run <name>`
name = "example_search"

# Human-readable description shown in `ati tool list` and `ati tool info`
description = "Search the Example API for items matching a query"

# API endpoint path (appended to provider.base_url)
endpoint = "/search"

# HTTP method: "GET", "POST", "PUT", or "DELETE"
# For GET: args become query parameters
# For POST/PUT: args become JSON body
method = "POST"

# Scope required to use this tool.
# Must match an entry in ~/.ati/scopes.json for the agent to access it.
# If omitted or empty, the tool is always accessible (no scope check).
scope = "tool:example_search"

# --- Input Schema (JSON Schema format) ---
# Defines the arguments the tool accepts.
# Used for validation, documentation, and `ati tool info` display.

[tools.input_schema]
type = "object"
required = ["query"]

[tools.input_schema.properties.query]
type = "string"
description = "The search query string"

[tools.input_schema.properties.limit]
type = "integer"
description = "Maximum number of results to return"
default = 10

[tools.input_schema.properties.filters]
type = "string"
description = "Optional filter expression"

# --- Response Configuration ---
# Controls how the raw API response is processed before display.

[tools.response]
# JSONPath expression to extract relevant data from the API response.
# Examples:
#   "$.results[*]"                    — all items in results array
#   "$.data.items[*].{name, url}"     — specific fields from items
#   "$.total_count"                   — single value
# If omitted, the full response is returned as-is.
extract = "$.results[*]"

# Output format for the extracted data. Options:
#   "markdown_table" — formatted table (best for arrays of objects)
#   "json"           — pretty-printed JSON
#   "text"           — plain text (key: value pairs)
#   "raw"            — raw response passthrough
format = "markdown_table"


# --- You can define multiple tools per provider ---

[[tools]]
name = "example_fetch"
description = "Fetch a single item by ID from the Example API"
endpoint = "/items"
method = "GET"
scope = "tool:example_fetch"

[tools.input_schema]
type = "object"
required = ["id"]

[tools.input_schema.properties.id]
type = "string"
description = "The item ID to fetch"

[tools.response]
format = "json"
