[provider]
name = "sovos"
description = "Sovos — TIN (Tax Identification Number) verification against IRS records"
base_url = "https://api-us.sovos.com"
auth_type = "oauth2"
auth_key_name = "sovos_api_key"
auth_secret_name = "sovos_api_secret"
oauth2_token_url = "/oauth/token"
oauth2_basic_auth = true

[[tools]]
name = "sovos_tin_check"
description = "Verify a TIN/EIN against IRS records. Pass the TIN and business name inside a tinName object."
endpoint = "/v1/tin-check/validate/tinname"
method = "POST"
scope = "tool:sovos_tin_check"

[tools.input_schema]
type = "object"
required = ["tinName"]

[tools.input_schema.properties.tinName]
type = "object"
description = "TIN validation request"

[tools.input_schema.properties.tinName.properties.tin]
type = "string"
description = "Tax Identification Number (9 digits, no dashes)"

[tools.input_schema.properties.tinName.properties.lastName]
type = "string"
description = "Business name (for EIN) or last name (for SSN)"

[tools.input_schema.properties.partnerId]
type = "string"
description = "Optional partner identifier"

[tools.response]
format = "json"

[[tools]]
name = "sovos_tin_check_extended"
description = "Extended TIN verification with OFAC sanctions, Death Master File, and watchlist screening."
endpoint = "/v1/tin-check/validate/tinnameaddresslistmatch"
method = "POST"
scope = "tool:sovos_tin_check_extended"

[tools.input_schema]
type = "object"
required = ["tinName"]

[tools.input_schema.properties.tinName]
type = "object"
description = "TIN validation request"

[tools.input_schema.properties.tinName.properties.tin]
type = "string"
description = "Tax Identification Number (9 digits, no dashes)"

[tools.input_schema.properties.tinName.properties.lastName]
type = "string"
description = "Business name (for EIN) or last name (for SSN)"

[tools.input_schema.properties.partnerId]
type = "string"
description = "Optional partner identifier"

[tools.response]
format = "json"
