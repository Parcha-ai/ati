[provider]
name = "apify"
description = "Apify — Web scraping and automation platform"
base_url = "https://api.apify.com"
auth_type = "query"
auth_query_name = "token"
auth_key_name = "apify_api_key"

[[tools]]
name = "apify_actor_run"
description = "Run an Apify actor (web scraper/automation). Starts an actor run with optional configuration."
endpoint = "/v2/acts/{actor_id}/runs"
method = "POST"
scope = "tool:apify_actor_run"

[tools.input_schema]
type = "object"
required = ["actor_id"]

[tools.input_schema.properties.actor_id]
type = "string"
description = "Apify actor ID (e.g. 'apify/web-scraper')"

[tools.input_schema.properties.timeout]
type = "integer"
description = "Maximum run time in seconds"
default = 300

[tools.input_schema.properties.memory]
type = "integer"
description = "Allocated memory in MB"
default = 256

[tools.response]
format = "json"

[[tools]]
name = "apify_actor_search"
description = "Search for available Apify actors/scrapers in the Apify Store."
endpoint = "/v2/store"
method = "GET"
scope = "tool:apify_actor_search"

[tools.input_schema]
type = "object"
required = []

[tools.input_schema.properties.search]
type = "string"
description = "Search query"

[tools.input_schema.properties.limit]
type = "integer"
description = "Maximum number of results to return"
default = 20

[tools.input_schema.properties.offset]
type = "integer"
description = "Pagination offset"

[tools.input_schema.properties.category]
type = "string"
description = "Actor category filter"

[tools.response]
format = "json"
