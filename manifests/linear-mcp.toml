# Linear project management via MCP (Streamable HTTP transport)
#
# This manifest uses handler = "mcp" with HTTP transport.
# Tools are discovered dynamically via MCP tools/list.
# Auth is injected as a Bearer token on MCP HTTP requests.
#
# In proxy mode, the proxy injects the Linear API key.
# The sandbox never sees credentials.

[provider]
name = "linear"
description = "Linear project management via MCP"
handler = "mcp"
mcp_transport = "http"
mcp_url = "https://mcp.linear.app/mcp"
auth_type = "bearer"
auth_key_name = "linear_api_key"
category = "project-management"
