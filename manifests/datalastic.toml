[provider]
name = "datalastic"
description = "Datalastic — Vessel tracking and maritime intelligence"
base_url = "https://api.datalastic.com"
auth_type = "query"
auth_query_name = "api-key"
auth_key_name = "datalastic_api_key"

[[tools]]
name = "vessel_search_datalastic"
description = "Search for vessels by MMSI, IMO, or name"
endpoint = "/api/v0/vessel_find"
method = "GET"
scope = "tool:vessel_search_datalastic"

[tools.input_schema]
type = "object"

[tools.input_schema.properties.mmsi]
type = "string"
description = "MMSI number"

[tools.input_schema.properties.imo]
type = "string"
description = "IMO number"

[tools.input_schema.properties.name]
type = "string"
description = "Vessel name"

[tools.response]
format = "json"
