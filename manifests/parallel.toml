[provider]
name = "parallel"
description = "Parallel.ai — Web search and content extraction"
base_url = "https://api.parallel.ai/v1beta"
auth_type = "bearer"
auth_key_name = "parallel_api_key"

[[tools]]
name = "web_search"
description = "Search the web using Parallel.ai. Returns relevant results with titles, URLs, and snippets. Supports domain filtering and date-based filtering."
endpoint = "/search"
method = "POST"
scope = "tool:web_search"

[tools.input_schema]
type = "object"
required = ["objective"]

[tools.input_schema.properties.objective]
type = "string"
description = "What you are searching for (natural language search objective)"

[tools.input_schema.properties.search_queries]
type = "array"
description = "Specific search queries to use (optional, auto-generated from objective if not provided)"

[tools.input_schema.properties.max_results]
type = "integer"
description = "Maximum results to return"
default = 5

[tools.input_schema.properties.mode]
type = "string"
description = "Search mode: 'one-shot' for fast single search, 'agentic' for iterative deep search"
default = "one-shot"

[tools.input_schema.properties.published_after]
type = "string"
description = "Only return results published after this date (ISO 8601)"

[tools.input_schema.properties.published_before]
type = "string"
description = "Only return results published before this date (ISO 8601)"

[tools.input_schema.properties.include_domains]
type = "array"
description = "Only include results from these domains"

[tools.input_schema.properties.exclude_domains]
type = "array"
description = "Exclude results from these domains"

[tools.response]
extract = "$.results[*]"
format = "json"

[[tools]]
name = "web_fetch"
description = "Fetch and extract content from a web page. Returns clean, readable text extracted from the URL."
endpoint = "/extract"
method = "POST"
scope = "tool:web_fetch"

[tools.input_schema]
type = "object"
required = ["url"]

[tools.input_schema.properties.url]
type = "string"
description = "URL to fetch and extract content from"

[tools.input_schema.properties.include_links]
type = "boolean"
description = "Include links found on the page"
default = false

[tools.response]
format = "text"
