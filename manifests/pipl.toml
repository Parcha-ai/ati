[provider]
name = "pipl"
description = "Pipl — People search engine for identity resolution by email, phone, name, or address"
base_url = "https://api.pipl.com"
auth_type = "query"
auth_query_name = "key"
auth_key_name = "pipl_api_key"

[[tools]]
name = "pipl_person_search"
description = "Search for a person by email, phone, name, or address. Returns identity data including social profiles, employment, and contact details."
endpoint = "/search/"
method = "GET"
scope = "tool:pipl_person_search"

[tools.input_schema]
type = "object"
required = []

[tools.input_schema.properties.email]
type = "string"
description = "Email address to search"

[tools.input_schema.properties.phone]
type = "string"
description = "Phone number to search"

[tools.input_schema.properties.first_name]
type = "string"
description = "First name"

[tools.input_schema.properties.last_name]
type = "string"
description = "Last name"

[tools.input_schema.properties.raw_name]
type = "string"
description = "Full name as a single string"

[tools.input_schema.properties.raw_address]
type = "string"
description = "Full address as a single string"

[tools.input_schema.properties.city]
type = "string"
description = "City name"

[tools.input_schema.properties.state]
type = "string"
description = "State or region"

[tools.input_schema.properties.country]
type = "string"
description = "2-letter country code (e.g. 'US', 'GB')"

[tools.response]
format = "json"
