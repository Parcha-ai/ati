[provider]
name = "serpapi"
description = "SerpAPI — YouTube search, Google Flights, Google Hotels, airport lookup, image search, and news search"
base_url = "https://serpapi.com"
auth_type = "query"
auth_query_name = "api_key"
auth_key_name = "serpapi_api_key"

[[tools]]
name = "youtube_search"
description = "Search YouTube for videos. Returns video titles, channels, views, durations, and URLs."
endpoint = "/search"
method = "GET"
scope = "tool:youtube_search"

[tools.input_schema]
type = "object"
required = ["search_query", "engine"]

[tools.input_schema.properties.engine]
type = "string"
description = "Search engine identifier"
default = "youtube"

[tools.input_schema.properties.search_query]
type = "string"
description = "YouTube search query"

[tools.input_schema.properties.sp]
type = "string"
description = "Sort/filter parameter (e.g. 'CAISAhAB' for upload date)"

[tools.response]
extract = "$.video_results[*]"
format = "json"

[[tools]]
name = "serpapi_flights"
description = "Search Google Flights for flight options between airports. Returns prices, airlines, durations, and stops."
endpoint = "/search"
method = "GET"
scope = "tool:serpapi_flights"

[tools.input_schema]
type = "object"
required = ["engine", "departure_id", "arrival_id", "outbound_date"]

[tools.input_schema.properties.engine]
type = "string"
description = "Search engine identifier"
default = "google_flights"

[tools.input_schema.properties.departure_id]
type = "string"
description = "Departure airport IATA code (e.g. 'SFO', 'JFK', 'LAX')"

[tools.input_schema.properties.arrival_id]
type = "string"
description = "Arrival airport IATA code (e.g. 'LHR', 'NRT')"

[tools.input_schema.properties.outbound_date]
type = "string"
description = "Departure date in YYYY-MM-DD format"

[tools.input_schema.properties.return_date]
type = "string"
description = "Return date in YYYY-MM-DD format (omit for one-way)"

[tools.input_schema.properties.adults]
type = "integer"
description = "Number of adult passengers"
default = 1

[tools.input_schema.properties.travel_class]
type = "integer"
description = "Cabin class: 1=Economy, 2=Premium Economy, 3=Business, 4=First"
default = 1

[tools.input_schema.properties.stops]
type = "integer"
description = "Max stops: 0=Any, 1=Non-stop only, 2=1 stop max, 3=2 stops max"
default = 0

[tools.input_schema.properties.currency]
type = "string"
description = "Currency code for prices"
default = "USD"

[tools.input_schema.properties.type]
type = "integer"
description = "Trip type: 1=Round trip, 2=One way"
default = 1

[tools.response]
format = "json"

[[tools]]
name = "serpapi_hotels"
description = "Search Google Hotels for accommodations. Returns hotel names, prices, ratings, and amenities."
endpoint = "/search"
method = "GET"
scope = "tool:serpapi_hotels"

[tools.input_schema]
type = "object"
required = ["engine", "q", "check_in_date", "check_out_date"]

[tools.input_schema.properties.engine]
type = "string"
description = "Search engine identifier"
default = "google_hotels"

[tools.input_schema.properties.q]
type = "string"
description = "Location or hotel name (e.g. 'Hotels in San Francisco')"

[tools.input_schema.properties.check_in_date]
type = "string"
description = "Check-in date in YYYY-MM-DD format"

[tools.input_schema.properties.check_out_date]
type = "string"
description = "Check-out date in YYYY-MM-DD format"

[tools.input_schema.properties.adults]
type = "integer"
description = "Number of adult guests"
default = 2

[tools.input_schema.properties.currency]
type = "string"
description = "Currency code for prices"
default = "USD"

[tools.input_schema.properties.sort_by]
type = "string"
description = "Sort results: lowest_price, highest_rating, most_reviewed"

[tools.input_schema.properties.hotel_class]
type = "string"
description = "Star rating filter (e.g. '4' for 4-star hotels)"

[tools.input_schema.properties.min_price]
type = "integer"
description = "Minimum price per night"

[tools.input_schema.properties.max_price]
type = "integer"
description = "Maximum price per night"

[tools.response]
extract = "$.properties[*]"
format = "json"

[[tools]]
name = "airport_lookup"
description = "Look up airport IATA codes by city or airport name. Use before searching flights."
endpoint = "/search"
method = "GET"
scope = "tool:airport_lookup"

[tools.input_schema]
type = "object"
required = ["engine", "q"]

[tools.input_schema.properties.engine]
type = "string"
description = "Search engine identifier"
default = "google_flights_autocomplete"

[tools.input_schema.properties.q]
type = "string"
description = "City or airport name to look up (e.g. 'San Francisco', 'Heathrow')"

[tools.input_schema.properties.hl]
type = "string"
description = "Language code"
default = "en"

[tools.input_schema.properties.type]
type = "string"
description = "Lookup type"
default = "fast"

[tools.response]
extract = "$.airports[*]"
format = "json"

[[tools]]
name = "search_images"
description = "Search Google Images for image results. Returns image URLs, titles, sources, and dimensions."
endpoint = "/search"
method = "GET"
scope = "tool:search_images"

[tools.input_schema]
type = "object"
required = ["engine", "q"]

[tools.input_schema.properties.engine]
type = "string"
description = "Search engine identifier"
default = "google_images"

[tools.input_schema.properties.q]
type = "string"
description = "Image search query"

[tools.input_schema.properties.tbm]
type = "string"
description = "Search type parameter"
default = "isch"

[tools.input_schema.properties.num]
type = "integer"
description = "Number of results to return"
default = 10

[tools.response]
extract = "$.images_results[*]"
format = "json"

[[tools]]
name = "news_search"
description = "Search Google News for news articles. Returns headlines, sources, dates, and links."
endpoint = "/search"
method = "GET"
scope = "tool:news_search"

[tools.input_schema]
type = "object"
required = ["engine", "q"]

[tools.input_schema.properties.engine]
type = "string"
description = "Search engine identifier"
default = "google_news"

[tools.input_schema.properties.q]
type = "string"
description = "News search query"

[tools.input_schema.properties.gl]
type = "string"
description = "Country code for localized results"
default = "us"

[tools.input_schema.properties.hl]
type = "string"
description = "Language code"
default = "en"

[tools.response]
extract = "$.news_results[*]"
format = "json"
