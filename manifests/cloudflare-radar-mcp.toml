# Cloudflare Radar — Internet traffic insights via MCP (Streamable HTTP)
#
# Remote MCP server, no API key needed (public Cloudflare Radar data).
# 80+ tools for BGP, routing, security, traffic, DNS, and more.
#
# https://github.com/cloudflare/mcp-server-cloudflare/tree/main/apps/radar

[provider]
name = "cloudflare-radar"
description = "Cloudflare Radar — global Internet traffic insights, BGP, security, DNS"
handler = "mcp"
mcp_transport = "http"
mcp_url = "https://radar.mcp.cloudflare.com/mcp"
auth_type = "none"
category = "internet-intelligence"
