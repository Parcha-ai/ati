[provider]
name = "pdl"
description = "PeopleDataLabs — Company and person enrichment, search by SQL-style queries"
base_url = "https://api.peopledatalabs.com"
auth_type = "header"
auth_header_name = "X-Api-Key"
auth_key_name = "pdl_api_key"

[[tools]]
name = "pdl_company_enrichment"
description = "Enrich a company profile by name, website, LinkedIn URL, or ticker. Returns firmographic data including size, industry, location, and funding."
endpoint = "/v5/company/enrich"
method = "GET"
scope = "tool:pdl_company_enrichment"

[tools.input_schema]
type = "object"
required = []

[tools.input_schema.properties.name]
type = "string"
description = "Company name (e.g. 'Stripe', 'Google')"

[tools.input_schema.properties.website]
type = "string"
description = "Company website URL (e.g. 'https://stripe.com')"

[tools.input_schema.properties.profile]
type = "string"
description = "Company LinkedIn or social profile URL"

[tools.input_schema.properties.ticker]
type = "string"
description = "Stock ticker symbol (e.g. 'AAPL')"

[tools.input_schema.properties.location]
type = "string"
description = "Company headquarters location (e.g. 'San Francisco, CA')"

[tools.input_schema.properties.min_likelihood]
type = "integer"
description = "Minimum confidence score from 1-10 (default 2)"
default = 2

[tools.response]
format = "json"

[[tools]]
name = "pdl_company_search"
description = "Search for companies using SQL-style queries. Returns matching company profiles with firmographic data."
endpoint = "/v5/company/search"
method = "GET"
scope = "tool:pdl_company_search"

[tools.input_schema]
type = "object"
required = ["sql"]

[tools.input_schema.properties.sql]
type = "string"
description = "SQL-style query (e.g. \"SELECT * FROM company WHERE name='stripe'\")"

[tools.input_schema.properties.size]
type = "integer"
description = "Number of results to return"
default = 10

[tools.response]
format = "json"

[[tools]]
name = "pdl_person_enrichment"
description = "Enrich a person profile by name, email, phone, company, school, or LinkedIn URL. Returns professional and demographic data."
endpoint = "/v5/person/enrich"
method = "GET"
scope = "tool:pdl_person_enrichment"

[tools.input_schema]
type = "object"
required = []

[tools.input_schema.properties.name]
type = "string"
description = "Full name of the person"

[tools.input_schema.properties.first_name]
type = "string"
description = "First name"

[tools.input_schema.properties.last_name]
type = "string"
description = "Last name"

[tools.input_schema.properties.email]
type = "string"
description = "Email address"

[tools.input_schema.properties.phone]
type = "string"
description = "Phone number"

[tools.input_schema.properties.company]
type = "string"
description = "Current employer name"

[tools.input_schema.properties.school]
type = "string"
description = "School or university name"

[tools.input_schema.properties.linkedin_url]
type = "string"
description = "LinkedIn profile URL"

[tools.input_schema.properties.min_likelihood]
type = "integer"
description = "Minimum confidence score from 1-10 (default 2)"
default = 2

[tools.response]
format = "json"

[[tools]]
name = "pdl_person_search"
description = "Search for people using SQL-style queries. Returns matching person profiles with professional and demographic data."
endpoint = "/v5/person/search"
method = "GET"
scope = "tool:pdl_person_search"

[tools.input_schema]
type = "object"
required = ["sql"]

[tools.input_schema.properties.sql]
type = "string"
description = "SQL-style query (e.g. \"SELECT * FROM person WHERE location_country='united states'\")"

[tools.input_schema.properties.size]
type = "integer"
description = "Number of results to return"
default = 10

[tools.response]
format = "json"
