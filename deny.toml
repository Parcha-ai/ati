# cargo-deny configuration — https://embarkstudios.github.io/cargo-deny/
#
# Blocks supply chain vectors: typosquatting via alt registries,
# git-source dependency hijacking, known vulns, license violations.

[advisories]
# All vulnerability advisories are errors by default in 0.19+.
# Unmaintained crates are warnings (won't block CI).
unmaintained = "none"
yanked = "warn"
ignore = [
    # RUSTSEC-2026-0097: rand 0.8 unsound *only* when a custom log::Log
    # implementation calls `rand::rng()` with thread_rng + log features
    # enabled. ATI uses tracing_subscriber::fmt::layer() which is a
    # tracing Layer, not a log::Log implementation, so the trigger path
    # is not reachable. The rand 0.8 line has no backport fix; moving
    # to rand 0.9 is a separate ecosystem-wide migration tracked apart
    # from this PR.
    "RUSTSEC-2026-0097",
    # RUSTSEC-2023-0071: Marvin timing attack in `rsa` 0.x. The `rsa`
    # crate is pulled in transitively by `sqlx-mysql`, which appears in
    # Cargo.lock even when the umbrella sqlx crate is built with only
    # the `postgres` feature (cargo locks all optional deps of sqlx). We
    # never enable mysql, so sqlx-mysql is NOT compiled into the binary
    # and `rsa` is never linked or executed. The upstream `rsa` crate
    # has no fix available since 2023; switching to `rustls`-based MySQL
    # auth is a sqlx ecosystem migration, not an ATI change. Re-evaluate
    # if we ever enable a sqlx mysql feature (we will not).
    "RUSTSEC-2023-0071",
]

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "CDLA-Permissive-2.0",
]
unused-allowed-license = "warn"

[bans]
multiple-versions = "warn"
wildcards = "deny"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
