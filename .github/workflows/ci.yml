name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings

jobs:
  test:
    name: Test and E2E
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9 # master
        with:
          toolchain: stable
      - name: Rust test suite
        run: cargo test --quiet
      - name: Build debug binary for E2E scripts
        run: cargo build
      - name: Sentry feature smoke test
        env:
          SENTRY_DSN: https://public@o0.ingest.sentry.io/0
          ENVIRONMENT_TIER: staging
          SERVICE_NAME: ati-ci-smoke
          ATI_SENTRY_DEBUG: "1"
        run: |
          cargo build --features sentry
          # Regression guard for "sentry crate was compiled without transport"
          # panic (fixed in #XXX). init_sentry runs on every command; error
          # paths call tracing::error! which the sentry layer forwards to the
          # HTTP transport. With ATI_SENTRY_DEBUG we get "client close; request
          # transport to shut down" in the logs, which proves the transport
          # was wired in at compile time and flushed at exit.
          ./target/debug/ati --output text run __nonexistent_tool_for_smoke__ 2>&1 | tee /tmp/ati-smoke.log || true
          grep -q "enabled sentry client" /tmp/ati-smoke.log || { echo "FAIL: sentry client did not initialize"; exit 1; }
          ./target/debug/ati tool list > /dev/null
      - name: Proxy mode E2E
        run: bash scripts/test_proxy_e2e.sh
      - name: Skills E2E
        run: ATI_BIN=./target/debug/ati bash scripts/test_skills_e2e.sh
      - name: Proxy server E2E
        run: bash scripts/test_proxy_server_e2e.sh

  deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9 # master
        with:
          toolchain: stable
      - run: cargo install cargo-deny --locked
      - run: cargo deny check

  fmt:
    name: Formatting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9 # master
        with:
          toolchain: stable
          components: rustfmt
      - run: cargo fmt --all --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9 # master
        with:
          toolchain: stable
          components: clippy
      - run: cargo clippy --all-targets -- -D warnings

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9 # master
        with:
          toolchain: stable
          components: llvm-tools-preview
      - name: Install cargo-llvm-cov
        run: cargo install cargo-llvm-cov --locked
      - name: Generate coverage
        run: cargo llvm-cov --lcov --output-path lcov.info
      - name: Coverage summary
        run: cargo llvm-cov --summary-only

  audit:
    name: cargo-audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9 # master
        with:
          toolchain: stable
      - run: cargo install cargo-audit --locked
      - run: cargo audit
